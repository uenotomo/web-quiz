<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>司会者画面</title>

    <style>
        body {
            background-image: url("/static/img/th-1.webp");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        /* QRコード部分だけ黒背景にする */
        #qr_area {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;

            background: black;
            padding: 40px;
            border-radius: 20px;
        }

        #qrcode {
            width: 600px !important;
            height: 600px !important;
        }

        #qr_area h2 {
            font-size: 40px;
            margin-bottom: 25px;
        }

        #qr_url {
            margin-top: 20px;
            font-size: 28px;
            color: #0ff;
        }

        #control {
            position: fixed;
            top: 0;
            right: 0;
            padding: 10px;
            text-align: right;
        }

        #control button {
            display: block;
            margin: 5px 0;
            padding: 10px 20px;
            font-size: 20px;
        }

        #stage_box {
            margin-top: 150px;
            font-size: 40px;
            display: none;
            padding: 40px;
            border-radius: 20px;
            background: rgba(0,0,0,0.5);
        }

        #stage_text {
            margin-top: 20px;
            font-size: 24px;
        }

        #question_box {
            margin-top: 120px;
            padding: 30px;
            font-size: 36px;
            font-weight: bold;
            border: 3px solid #0ff;
            border-radius: 20px;
            width: 70%;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 0 20px #0ff;
            display: none;
            background: rgba(0,0,0,0.5);
        }

        #choices_box {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .choice_item {
            padding: 20px;
            background: #222;
            border: 2px solid #0ff;
            border-radius: 15px;
            font-size: 28px;
            box-shadow: 0 0 10px #0ff;
        }

        /* 投票数表示 */
        .vote_count {
            margin-top: 10px;
            font-size: 24px;
            color: #0ff;
            font-weight: bold;
        }

        /* 正解の選択肢を光らせる */
        .correct_choice {
            border: 4px solid yellow !important;
            animation: blink 1s infinite;
        }

        #ranking_title {
            margin-top: 40px;
            font-size: 30px;
            display: none;
        }

        #ranking {
            margin-top: 10px;
            height: calc(100vh - 200px);
            display: none;
            flex-direction: column-reverse;
            justify-content: flex-start;
            align-items: center;
        }

        #final_ranking_title {
            margin-top: 80px;
            font-size: 36px;
            display: none;
        }

        #final_ranking {
            margin-top: 20px;
            height: calc(100vh - 200px);
            display: none;
            flex-direction: column-reverse;
            justify-content: flex-start;
            align-items: center;
        }

        /* ▼▼▼ ランキング枠デザイン（青グラデ＋光縁取り） ▼▼▼ */

        .rank_item {
            width: 60%;
            max-width: 900px;
            margin: 8px auto;
            padding: 14px 24px;

            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;

            background: linear-gradient(90deg, rgba(0,40,80,0.9), rgba(0,120,200,0.9));
            border-radius: 14px;
            border: 2px solid rgba(0, 255, 255, 0.8);
            box-shadow: 0 0 18px rgba(0, 200, 255, 0.7);

            font-size: 26px;

            opacity: 0;
            transform: translateY(200px);
            animation: slideUp 0.5s forwards;
        }

        .rank_item .rank_no {
            font-size: 30px;
            font-weight: bold;
            color: #ffeb3b;
            min-width: 90px;
            text-align: left;
        }

        .rank_item .rank_name {
            flex: 1;
            text-align: left;
        }

        .rank_item .rank_time {
            min-width: 160px;
            text-align: right;
        }

        .rank_item.rank_1 {
            border-color: #ffd700;
            box-shadow: 0 0 26px rgba(255, 215, 0, 0.9);
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(200px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink {
            0% { opacity: 1; transform: scale(1.0); }
            50% { opacity: 0.2; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1.0); }
        }

        /* ▲▲▲ ランキング枠デザインここまで ▲▲▲ */

        /* ▼▼▼ 右下 Reset ボタン ▼▼▼ */
        #reset_button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 22px;
            font-size: 18px;
            background: #444;
            color: white;
            border: 2px solid #ccc;
            border-radius: 10px;
            cursor: pointer;
            opacity: 0.8;
            z-index: 9999;
        }

        #reset_button:hover {
            opacity: 1;
            background: #666;
        }
        /* ▲▲▲ Reset ボタンここまで ▲▲▲ */

    </style>
</head>

<body>

<!-- QRコード -->
<div id="qr_area">
    <h2>参加者用 QR コード</h2>
    <div id="qrcode"></div>
    <div id="qr_url"></div>
</div>

<!-- 操作ボタン -->
<div id="control">
    <button onclick="nextStage()">次へ</button>
    <button onclick="finishQuiz()">締め切り</button>
</div>

<!-- ★ 右下 Reset ボタン -->
<button id="reset_button" onclick="resetQuiz()">Reset</button>

<!-- ステージ表示 -->
<div id="stage_box">
    <div id="stage_title"></div>
    <div id="stage_text"></div>
</div>

<!-- 問題表示 -->
<div id="question_box"></div>

<!-- ランキング -->
<h2 id="ranking_title">ランキング</h2>
<div id="ranking"></div>

<!-- 総合ランキング -->
<h2 id="final_ranking_title">総合ランキング</h2>
<div id="final_ranking"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<script>
    // クラウドでは現在のホストをそのまま参加URLにする
    const joinUrl = window.location.origin;

    new QRCode(document.getElementById("qrcode"), {
        text: joinUrl,
        width: 600,
        height: 600
    });

    document.getElementById("qr_url").textContent = joinUrl;

    const socket = io({
        transports: ["polling"]
    });

    let currentStage = 0;

    function nextStage(){
        socket.emit("next_stage");
    }

    function finishQuiz(){
        socket.emit("finish_quiz");
    }

    function removeFinalButton(){
        const btn = document.getElementById("final_button");
        if(btn) btn.remove();
    }

    function showFinalButton(){
        removeFinalButton();
        const btn = document.createElement("button");
        btn.id = "final_button";
        btn.textContent = "総合ランキングへ";
        btn.style.background = "#ff0";
        btn.style.color = "#000";
        btn.style.fontWeight = "bold";
        btn.style.marginTop = "10px";
        btn.onclick = () => socket.emit("next_stage");
        document.getElementById("control").appendChild(btn);
    }

    /* 結果ボタン */
    function showResultButton(){
        const old = document.getElementById("result_button");
        if(old) old.remove();

        const btn = document.createElement("button");
        btn.id = "result_button";
        btn.textContent = "結果";
        btn.style.background = "#f00";
        btn.style.color = "#fff";
        btn.style.fontWeight = "bold";
        btn.style.fontSize = "26px";
        btn.style.marginTop = "10px";
        btn.style.padding = "10px 30px";

        btn.onclick = () => {
            socket.emit("show_correct");
            btn.remove();
        };

        document.getElementById("control").appendChild(btn);
    }

    /* ランキングへボタン */
    function showGoRankingButton(){
        const old = document.getElementById("go_ranking_button");
        if(old) old.remove();

        const btn = document.createElement("button");
        btn.id = "go_ranking_button";
        btn.textContent = "ランキングへ";
        btn.style.background = "#ff0";
        btn.style.color = "#000";
        btn.style.fontWeight = "bold";
        btn.style.fontSize = "26px";
        btn.style.marginTop = "10px";
        btn.style.padding = "10px 30px";

        btn.onclick = () => {
            socket.emit("finish_quiz_after_vote");
            btn.remove();
        };

        document.getElementById("control").appendChild(btn);
    }

    socket.on("show_stage", data => {
        currentStage = data.stage;

        document.getElementById("qr_area").style.display = "none";
        document.getElementById("question_box").style.display = "none";
        document.getElementById("ranking_title").style.display = "none";
        document.getElementById("ranking").style.display = "none";
        document.getElementById("final_ranking_title").style.display = "none";
        document.getElementById("final_ranking").style.display = "none";

        const box = document.getElementById("stage_box");
        const title = document.getElementById("stage_title");
        const text = document.getElementById("stage_text");

        box.style.display = "block";

        if(currentStage === 1){
            title.innerText = "ちゃんと聞いてたか問題";
            text.innerHTML = `
                <p>1. 早押しクイズです</p>
                <p>2. 正解するとポイントが入ります</p>
                <p>3. 最後に総合ランキングを発表します</p>
            `;
        }
        else if(currentStage === 2){
            title.innerText = "練習問題";
            text.innerHTML = "これから練習問題を1問出します。";
        }
        else if(currentStage === 4){
            title.innerText = "本問題";
            text.innerHTML = "ここから本番5問が始まります。";
        }
    });

    socket.on("show_question", data => {
        currentStage = data.stage;

        document.getElementById("stage_box").style.display = "none";
        document.getElementById("ranking_title").style.display = "none";
        document.getElementById("ranking").style.display = "none";

        const qbox = document.getElementById("question_box");
        qbox.style.display = "block";

        const choicesHtml = Object.entries(data.choices)
            .map(([k, v]) => `<div class="choice_item" id="choice_${k}">${k}: ${v}</div>`)
            .join("");

        qbox.innerHTML = `
            <div>${data.text}</div>
            <div id="choices_box">${choicesHtml}</div>
        `;
    });

    /* 投票数表示（締め切り後すぐ） */
    socket.on("vote_result", vote => {
        const box = document.getElementById("choices_box");
        if(!box) return;

        for(const key in vote){
            const div = document.getElementById("choice_" + key);
            if(div){
                div.innerHTML += `<div class="vote_count">投票数：${vote[key]}</div>`;
            }
        }

        // ここではまだ正解は光らせない
        // 司会者が「結果」ボタンを押したら正解発表
        showResultButton();
    });

    /* 正解演出（結果ボタンを押した後だけ発動） */
    socket.on("correct_choice", data => {
        const correct = data.correct_choice;
        const div = document.getElementById("choice_" + correct);
        if(div){
            div.classList.add("correct_choice");
        }

        // 正解発表のあとに「ランキングへ」ボタンを出す
        showGoRankingButton();
    });

    /* ランキング（青グラデ枠版） */
    socket.on("ranking", list => {
        document.getElementById("question_box").style.display = "none";
        document.getElementById("ranking_title").style.display = "block";

        const container = document.getElementById("ranking");
        container.style.display = "flex";
        container.innerHTML = "";

        const total = Math.min(list.length, 10);
        const reversed = [...list].slice(0, total).reverse();

        let index = 0;

        function showNext(){
            if(index >= reversed.length){
                if(currentStage === 9){
                    showFinalButton();
                }
                return;
            }

            const item = reversed[index];
            const rank = total - index;

            const div = document.createElement("div");
            div.classList.add("rank_item");
            if(rank === 1){
                div.classList.add("rank_1");
                div.style.animation = "blink 1s infinite, slideUp 0.5s forwards";
            }

            div.innerHTML = `
                <div class="rank_no">${rank}位</div>
                <div class="rank_name">${item.name}</div>
                <div class="rank_time">${item.time.toFixed(3)} 秒</div>
            `;

            container.appendChild(div);
            index++;

            let delay = 500;
            if(rank <= 4 && rank >= 3) delay = 700;
            if(rank === 2) delay = 700;
            if(rank === 1) delay = 1500;

            setTimeout(showNext, delay);
        }

        showNext();
    });

    /* 総合ランキング（青グラデ枠版） */
    socket.on("final_ranking", list => {
        document.getElementById("ranking_title").style.display = "none";
        document.getElementById("ranking").style.display = "none";

        const container = document.getElementById("final_ranking");
        container.style.display = "flex";
        container.innerHTML = "";

        document.getElementById("final_ranking_title").style.display = "block";

        const total = Math.min(list.length, 10);
        const reversed = [...list].slice(0, total).reverse();

        let index = 0;

        function showNext(){
            if(index >= reversed.length) return;

            const item = reversed[index];
            const rank = total - index;

            const div = document.createElement("div");
            div.classList.add("rank_item");
            if(rank === 1){
                div.classList.add("rank_1");
                div.style.animation = "blink 1s infinite, slideUp 0.5s forwards";
            }

            div.innerHTML = `
                <div class="rank_no">${rank}位</div>
                <div class="rank_name">${item.name}</div>
                <div class="rank_time">${item.points.toFixed(1)} pt</div>
            `;

            container.appendChild(div);
            index++;

            let delay = 500;
            if(rank <= 4 && rank >= 3) delay = 800;
            if(rank === 2) delay = 1000;
            if(rank === 1) delay = 1800;

            setTimeout(showNext, delay);
        }

        showNext();
    });

    /* ▼▼▼ Reset 機能 ▼▼▼ */
    function resetQuiz(){
        if(confirm("本当にリセットしますか？\n（全ての進行状況が消えます）")){
            socket.emit("reset_quiz");
        }
    }

    socket.on("quiz_reset", () => {
        location.reload();
    });
    /* ▲▲▲ Reset 機能ここまで ▲▲▲ */

</script>

</body>
</html>
